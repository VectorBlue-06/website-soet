<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty & Staff Login - SOET</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        /* Reset margins and set font */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* 1. The Base Background Setup */
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #050505; /* Deep black/grey base */
            position: relative;
            overflow: hidden; /* Prevents scrollbars from the animation */
        }

        /* 2. The Animated CSS Grid */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            /* Creates the grid lines */
            background-size: 40px 40px;
            background-image: 
                linear-gradient(to right, rgba(255, 255, 255, 0.07) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.07) 1px, transparent 1px);
            /* Animates the grid diagonally */
            animation: scrollGrid 3s linear infinite;
            z-index: -2;
        }

        /* 3. The Vignette (Fades the edges to black so it looks cinematic) */
        body::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at center, transparent 0%, #000000 100%);
            z-index: -1;
        }

        /* The Animation Keyframes */
        @keyframes scrollGrid {
            0% { background-position: 0px 0px; }
            100% { background-position: 40px 40px; }
        }

        /* 4. The Glass Card (Slightly adjusted to pop against the dark grid) */
        .login-card {
            background: rgba(255, 255, 255, 0.92); 
            backdrop-filter: blur(12px); 
            padding: 40px 35px;
            border-radius: 12px;
            /* Added a subtle white/maroon glow to the shadow */
            box-shadow: 0 0 40px rgba(128, 0, 0, 0.15), 0 15px 35px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 420px;
            text-align: center;
            border-top: 5px solid #800000;
            position: relative; /* Keeps card above the background */
            z-index: 10;
        }

        /* Typography & Logo */
        .logo-img {
            width: 70px;
            margin-bottom: 15px;
        }
        h2 {
            color: #800000;
            font-size: 22px;
            margin-bottom: 5px;
            line-height: 1.2;
        }
        p.subtitle {
            color: #475569;
            font-size: 14px;
            margin-bottom: 30px;
            font-weight: 600;
        }

        /* Input Fields with Icons */
        .input-group {
            position: relative;
            margin-bottom: 20px;
            text-align: left;
        }
        .input-group label {
            display: block;
            font-size: 13px;
            color: #333;
            margin-bottom: 6px;
            font-weight: 600;
        }
        .input-group i {
            position: absolute;
            left: 15px;
            top: 36px;
            color: #64748b;
            font-size: 14px;
        }
        .input-group input {
            width: 100%;
            padding: 12px 15px 12px 40px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.3s ease;
            background: #f8fafc;
        }
        .input-group input:focus {
            border-color: #800000;
            background: #fff;
            outline: none;
            box-shadow: 0 0 0 3px rgba(128, 0, 0, 0.1);
        }

        /* The Buttons */
        .btn-login {
            width: 100%;
            padding: 12px;
            background: #800000;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-login:hover {
            background: #600000;
            box-shadow: 0 5px 15px rgba(128, 0, 0, 0.5);
            transform: translateY(-1px);
        }

        .back-link {
            display: inline-block;
            margin-top: 25px;
            color: #64748b;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: 0.2s;
        }
        .back-link:hover {
            color: #800000;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <img src="../images/logo.png" alt="University Logo" class="logo-img" onerror="this.style.display='none'">
        
        <h2>Samrat Vikramaditya Vishwavidyalaya</h2>
        <p class="subtitle">SOET Faculty & Staff Portal</p>

        <form action="#" method="POST">
            <div class="input-group">
                <label for="employeeId">Employee ID</label>
                <i class="fa-solid fa-user-tie"></i>
                <input type="text" id="employeeId" placeholder="e.g. SOET-EMP-1042" required>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn-login">Sign In <i class="fa-solid fa-arrow-right-to-bracket"></i></button>
        </form>

        <a href="../index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Return to Homepage</a>
    </div>

</body>
</html>
