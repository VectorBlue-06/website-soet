<!DOCTYPE html>
<html>
<head>
<title>Student Login - School Of Engineering and Technology</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
body{
margin:0;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#f8f8f8,#ececec);
}
.login-card{
width:min(460px,92%);
background:#fff;
border:1px solid #ddd;
border-radius:12px;
padding:28px;
box-shadow:0 10px 24px rgba(0,0,0,0.08);
}
.login-card h1{
margin:0 0 6px;
font-size:24px;
color:#800000;
}
.login-card h2{
margin:0 0 22px;
font-size:18px;
color:#333;
font-weight:600;
}
label{
display:block;
font-size:14px;
color:#444;
margin:0 0 6px;
}
input{
width:100%;
box-sizing:border-box;
padding:11px 12px;
border:1px solid #bbb;
border-radius:8px;
margin-bottom:14px;
font-size:15px;
}
button{
width:100%;
border:none;
background:#800000;
color:#fff;
padding:12px;
border-radius:8px;
font-size:15px;
font-weight:600;
cursor:pointer;
}
.back-home{
margin-top:16px;
display:inline-block;
text-decoration:none;
color:#800000;
font-weight:600;
}
</style>
</head>
<body>
<div class="login-card">
<h1>Samrat Vikramaditya Vishwavidayalaya</h1>
<h2>SOET Student Login</h2>
<form>
<label for="student-id">Enrollment Number</label>
<input id="student-id" type="text" placeholder="Enter enrollment number">
<label for="student-pass">Password</label>
<input id="student-pass" type="password" placeholder="Enter password">
<button type="button">Sign In</button>
</form>
<a class="back-home" href="index.html"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
</div>
</body>
</html>
